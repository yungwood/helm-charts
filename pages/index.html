<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Yung Wood's Helm Charts</title>
    <link rel="icon" href="helm-charts.svg" type="image/svg+xml">
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fa;
        --panel: #ffffff;
        --text: #172033;
        --muted: #5d6678;
        --border: #d9dee8;
        --accent: #2563eb;
        --secondary-hover: #eef4ff;
      }

      :root[data-theme="dark"] {
        color-scheme: dark;
        --bg: #111827;
        --panel: #1f2937;
        --text: #f8fafc;
        --muted: #b6c0d1;
        --border: #374151;
        --accent: #6aa8ff;
        --secondary-hover: #263449;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.55;
      }

      main {
        width: min(960px, calc(100% - 32px));
        margin: 0 auto;
        padding: 48px 0;
      }

      header {
        margin-bottom: 32px;
      }

      .topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .brand img {
        width: 64px;
        height: 64px;
        border-radius: 12px;
        flex: none;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 5vw, 3.5rem);
        line-height: 1;
        letter-spacing: 0;
      }

      h2 {
        margin: 0 0 16px;
        font-size: 1.25rem;
        letter-spacing: 0;
      }

      p {
        margin: 0 0 16px;
        color: var(--muted);
      }

      a {
        color: var(--accent);
      }

      .panel {
        margin-top: 24px;
        padding: 24px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
      }

      pre {
        margin: 0;
        padding: 16px;
        overflow-x: auto;
        border-radius: 8px;
        background: #101828;
        color: #f8fafc;
      }

      pre code {
        padding: 0;
        background: transparent;
        color: inherit;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 20px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 16px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: transparent;
        color: var(--accent);
        font-weight: 650;
        text-decoration: none;
      }

      .button:hover {
        background: var(--secondary-hover);
      }

      .theme-toggle {
        display: inline-grid;
        grid-template-columns: 1fr 1fr;
        gap: 2px;
        padding: 3px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--panel);
      }

      .theme-toggle button {
        min-width: 56px;
        min-height: 34px;
        padding: 0 12px;
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        font: inherit;
      }

      .theme-toggle button[aria-pressed="true"] {
        background: var(--accent);
        color: #ffffff;
      }

      .artifacthub-widget-group {
        min-height: 160px;
      }

      .widget-variant {
        display: none;
      }

      :root[data-theme="light"] .widget-variant.light,
      :root[data-theme="dark"] .widget-variant.dark {
        display: block;
      }

      @media (max-width: 640px) {
        .topbar {
          align-items: stretch;
          flex-direction: column-reverse;
        }

        .theme-toggle {
          align-self: flex-end;
        }
      }
    </style>
    <script>
      const systemTheme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      document.documentElement.dataset.theme = systemTheme;
    </script>
  </head>
  <body>
    <main>
      <header>
        <div class="topbar">
          <div class="brand">
            <img src="helm-charts.svg" alt="" width="64" height="64">
            <div>
              <h1>Helm Charts</h1>
              <p>Public Helm chart repository for charts maintained by <a href="https://github.com/yungwood">yungwood</a>.</p>
            </div>
          </div>
          <div class="theme-toggle" aria-label="Theme">
            <button type="button" data-theme-choice="light">Light</button>
            <button type="button" data-theme-choice="dark">Dark</button>
          </div>
        </div>
        <div class="actions">
          <a class="button" href="https://github.com/yungwood/helm-charts">View source</a>
        </div>
      </header>

      <section class="panel" aria-labelledby="usage">
        <h2 id="usage">Usage</h2>
        <p>Add this repository to Helm, then search the available charts.</p>
        <pre><code>helm repo add yungwood https://yungwood.github.io/helm-charts/
helm search repo yungwood</code></pre>
      </section>

      <section class="panel" aria-labelledby="charts">
        <h2 id="charts">Charts</h2>
        <div class="widget-variant light">
          <div class="artifacthub-widget-group" data-url="https://artifacthub.io/packages/search?repo=yungwood&amp;sort=relevance&amp;page=1" data-theme="light" data-header="false" data-stars="true" data-color="#417598" data-responsive="true" data-loading="true"></div>
        </div>
        <div class="widget-variant dark">
          <div class="artifacthub-widget-group" data-url="https://artifacthub.io/packages/search?repo=yungwood&amp;sort=relevance&amp;page=1" data-theme="dark" data-header="false" data-stars="true" data-color="#6aa8ff" data-responsive="true" data-loading="true"></div>
        </div>
      </section>
    </main>
    <script>
      const themeButtons = document.querySelectorAll("[data-theme-choice]");

      function setTheme(theme) {
        document.documentElement.dataset.theme = theme;
        themeButtons.forEach((button) => {
          button.setAttribute("aria-pressed", String(button.dataset.themeChoice === theme));
        });
      }

      themeButtons.forEach((button) => {
        button.addEventListener("click", () => setTheme(button.dataset.themeChoice));
      });

      setTheme(document.documentElement.dataset.theme);
    </script>
    <script async src="https://artifacthub.io/artifacthub-widget.js"></script>
  </body>
</html>
