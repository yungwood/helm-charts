---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ical-filter-proxy.fullname" . }}
  labels:
    {{- include "ical-filter-proxy.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "ical-filter-proxy.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "ical-filter-proxy.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "ical-filter-proxy.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - -address
            - {{ .Values.app.address | default (printf ":%v" (.Values.service.port | int)) | quote }}
          {{- if .Values.management.enabled }}
            - -management-address
            - {{ .Values.management.address | default (printf ":%v" (.Values.management.service.port | int)) | quote }}
          {{- end }}
          {{- if .Values.metrics.enabled }}
            - -metrics
          {{- end }}
          {{- if .Values.metrics.calendarLabels }}
            - -metrics-calendar-labels
          {{- end }}
          {{- with .Values.args }}
            {{- toYaml . | nindent 12  }}
          {{- end }}
          {{- with .Values.command }}
          command: 
            {{- toYaml . | nindent 12  }}
          {{- end }}
          {{- with .Values.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          {{- if .Values.management.enabled }}
            - name: management
              containerPort: {{ .Values.management.service.port }}
              protocol: TCP
          {{- end }}
          {{- $livenessProbe := deepCopy .Values.livenessProbe }}
          {{- if and .Values.management.enabled (eq (dig "httpGet" "port" "" $livenessProbe) "http") }}
          {{- $_ := set $livenessProbe.httpGet "port" "management" }}
          {{- end }}
          livenessProbe:
            {{- toYaml $livenessProbe | nindent 12 }}
          {{- $readinessProbe := deepCopy .Values.readinessProbe }}
          {{- if and .Values.management.enabled (eq (dig "httpGet" "port" "" $readinessProbe) "http") }}
          {{- $_ := set $readinessProbe.httpGet "port" "management" }}
          {{- end }}
          readinessProbe:
            {{- toYaml $readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
          {{- if .Values.config.enabled }}
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
          {{- end }}
          {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
      {{- if .Values.config.enabled }}
        - name: config
          configMap:
            name: {{ include "ical-filter-proxy.fullname" . }}-config
      {{- end }}
      {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
