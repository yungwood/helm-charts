{{- if and .Values.metrics.enabled .Values.management.enabled .Values.management.service.enabled .Values.metrics.serviceMonitor.enabled -}}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "ical-filter-proxy.fullname" . }}
  labels:
    {{- include "ical-filter-proxy.labels" . | nindent 4 }}
    {{- with .Values.metrics.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.metrics.serviceMonitor.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "ical-filter-proxy.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: management
  endpoints:
    - port: management
      path: {{ .Values.metrics.serviceMonitor.path | quote }}
      scheme: {{ .Values.metrics.serviceMonitor.scheme | quote }}
      {{- with .Values.metrics.serviceMonitor.interval }}
      interval: {{ . | quote }}
      {{- end }}
      {{- with .Values.metrics.serviceMonitor.scrapeTimeout }}
      scrapeTimeout: {{ . | quote }}
      {{- end }}
      {{- with .Values.metrics.serviceMonitor.relabelings }}
      relabelings:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.metrics.serviceMonitor.metricRelabelings }}
      metricRelabelings:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
