name: Release Charts

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: release-charts
  cancel-in-progress: false

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v5.0.1
        with:
          version: v4.2.3
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Publish GitHub Pages files
        run: |
          worktree="/tmp/helm-charts-gh-pages-${GITHUB_RUN_ID}"
          git fetch origin gh-pages
          git worktree add "$worktree" origin/gh-pages
          cp -R pages/. "$worktree/"
          git -C "$worktree" add --all .
          if git -C "$worktree" diff --cached --quiet; then
            echo "GitHub Pages files unchanged"
          else
            git -C "$worktree" commit -m "Update GitHub Pages files"
            git -C "$worktree" push origin HEAD:gh-pages
          fi
          git worktree remove "$worktree"
